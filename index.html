<!DOCTYPE html>
<html>
<head>
    <title>AI Meeting Intelligence</title>
    <style>
        body {
            font-family: Arial;
            margin: 40px;
            background: #f5f5f5;
        }
        textarea {
            width: 100%;
            height: 120px;
            padding: 10px;
        }
        button {
            margin-top: 10px;
            padding: 10px 20px;
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }
        .card {
            background: white;
            padding: 15px;
            margin-top: 20px;
            border-radius: 8px;
        }
    </style>
</head>
<body>

<h1> AI Meeting Intelligence System</h1>
<h3 style="color:#007bff;">ET Hackathon Demo</h3>

<textarea id="input" placeholder="Enter meeting transcript..."></textarea>
<br>

<button onclick="processMeeting()">Process</button>

<p id="loading" style="display:none;">⏳ Processing...</p>

<div class="card">
    <h3> Decisions</h3>
    <pre id="decisions"></pre>
</div>

<div class="card">
    <h3> Tasks</h3>
    <pre id="tasks"></pre>
</div>

<div class="card">
    <h3> Escalations</h3>
    <pre id="escalations"></pre>
</div>

<div class="card">
    <h3> Agent Logs</h3>
    <pre id="logs"></pre>
</div>

<script>
async function processMeeting() {
    const transcript = document.getElementById("input").value;

    if (!transcript) {
        alert("Please enter transcript!");
        return;
    }

    document.getElementById("loading").style.display = "block";

    const response = await fetch("/process-meeting", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ transcript })
    });

    const data = await response.json();

    document.getElementById("loading").style.display = "none";

    document.getElementById("decisions").innerText =
        data.decisions || "No decisions found";

    document.getElementById("tasks").innerText =
        JSON.stringify(data.tasks, null, 2) || "No tasks";

    document.getElementById("escalations").innerText =
        data.escalations?.join("\n") || "No escalations";

    document.getElementById("logs").innerText =
        data.logs?.join("\n") || "No logs";
}
</script>

</body>
</html>
